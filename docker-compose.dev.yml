version: "3.8"

services:
  # PHP Application (PHP-FPM)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: organisasi_app_dev
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    env_file:
      - .env.dev
    environment:
      - APP_ENV=local
      - DB_HOST=mariadb
      - DB_PORT=3306
    networks:
      - organisasi_network_dev
    depends_on:
      mariadb:
        condition: service_healthy

  # Vite Development Server
  vite:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: organisasi_vite_dev
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
    env_file:
      - .env.dev
    ports:
      - "${VITE_PORT:-5180}:${VITE_PORT:-5180}"
    command: npm run dev -- --host --port ${VITE_PORT:-5180}
    networks:
      - organisasi_network_dev
    depends_on:
      - app

  # Nginx Web Server
  nginx:
    image: nginx:alpine
    container_name: organisasi_nginx_dev
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:80"
    volumes:
      - ./backend:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - organisasi_network_dev
    depends_on:
      - app

  # MariaDB Database (Replacing MySQL for Dev)
  mariadb:
    image: mariadb:10.11
    container_name: organisasi_mariadb_dev
    restart: unless-stopped
    env_file:
      - .env.dev
    environment:
      MARIADB_DATABASE: ${DB_DATABASE:-organisasi_manajemen_dev}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_password}
      MARIADB_USER: ${DB_USERNAME:-organisasi_user}
      MARIADB_PASSWORD: ${DB_PASSWORD:-organisasi_pass}
    ports:
      - "${FORWARD_DB_PORT:-33062}:3306"
    volumes:
      - mariadb_data_dev:/var/lib/mysql
    networks:
      - organisasi_network_dev
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-root_password}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PHPMyAdmin
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: organisasi_phpmyadmin_dev
    restart: unless-stopped
    environment:
      PMA_HOST: mariadb
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: ${DB_ROOT_PASSWORD:-root_password}
    ports:
      - "${FORWARD_PMA_PORT:-8082}:80"
    networks:
      - organisasi_network_dev
    depends_on:
      - mariadb

networks:
  organisasi_network_dev:
    driver: bridge

volumes:
  mariadb_data_dev:
    driver: local
