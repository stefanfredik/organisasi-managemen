version: "3.8"

services:
  # PHP Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: organisasi_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    ports:
      - "${VITE_PORT:-5173}:${VITE_PORT:-5173}"
    networks:
      - organisasi_network
    depends_on:
      - mysql
      - redis

  # Nginx Web Server
  nginx:
    image: nginx:alpine
    container_name: organisasi_nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:80"
      - "${APP_SSL_PORT:-8443}:443"
    volumes:
      - ./backend:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - organisasi_network
    depends_on:
      - app

  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: organisasi_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-organisasi_manajemen}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_password}
      MYSQL_USER: ${DB_USERNAME:-organisasi_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-organisasi_pass}
    ports:
      - "${DB_PORT:-33062}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf
    networks:
      - organisasi_network

  # Redis Cache
  redis:
    image: redis:6-alpine
    container_name: organisasi_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6382}:6379"
    volumes:
      - redis_data:/data
    networks:
      - organisasi_network

  # PHPMyAdmin
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: organisasi_phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: ${DB_ROOT_PASSWORD:-root_password}
    ports:
      - "${PMA_PORT:-8082}:80"
    networks:
      - organisasi_network
    depends_on:
      - mysql

  # Cloudflare Tunnel
  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: organisasi_tunnel
    restart: unless-stopped
    command: tunnel run --protocol http2 --token eyJhIjoiMTEwOTZlZGY3MDIzNmVkN2ZhZWY2YWU5YTZjZmY3YzgiLCJzIjoiSWFRODQyR053dDhtRER1Ulp4N2g0N0ZLODNMU1BmUzI1MXBhZlgxNk0zVT0iLCJ0IjoiODk4NTIyMGUtZjQ4Mi00YjM3LWI4NjItOTA1YTFkZDE2N2U5In0=
    networks:
      - organisasi_network
    depends_on:
      - nginx

networks:
  organisasi_network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
